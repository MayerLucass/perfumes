<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>🍻 Catálogo · Bar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f5f0eb;
            padding: 1rem 1rem 2rem;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* Header minimalista */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-top: 0.5rem;
            position: relative;
        }

        .header .logo-icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 0.2rem;
        }

        .header .subtitle {
            color: #8a7a6a;
            font-weight: 400;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: rgba(217, 197, 165, 0.06);
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(217, 197, 165, 0.08);
        }

        /* Indicador de categoría activa */
        .category-indicator {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 0.7rem;
            color: #4a3a2a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .category-indicator span {
            color: #D9C5A5;
        }

        /* Tabs modernos */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin: 1.5rem 0 1.8rem;
            padding: 0.3rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(217, 197, 165, 0.06);
        }

        .category-tabs button {
            background: transparent;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.82rem;
            color: #8a7a6a;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            position: relative;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-tabs button i {
            font-size: 0.9rem;
        }

        .category-tabs button.active {
            background: linear-gradient(135deg, #D9C5A5, #b8a082);
            color: #0a0a0a;
            box-shadow: 0 8px 25px rgba(217, 197, 165, 0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .category-tabs button:not(.active):hover {
            color: #D9C5A5;
            background: rgba(217, 197, 165, 0.06);
            transform: translateY(-1px);
        }

        .category-tabs button:active {
            transform: scale(0.95);
        }

        /* Contador de productos */
        .product-counter {
            text-align: center;
            font-size: 0.7rem;
            color: #4a3a2a;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .product-counter span {
            color: #D9C5A5;
            font-weight: 600;
        }

        /* Grid de productos */
        .product-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 0.5rem;
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            background: linear-gradient(145deg, #151515, #1a1a1a);
            border-radius: 24px;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            border: 1px solid rgba(217, 197, 165, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .product-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(217, 197, 165, 0.1), transparent, rgba(217, 197, 165, 0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .product-card:hover {
            transform: translateY(-3px) scale(1.01);
            border-color: rgba(217, 197, 165, 0.15);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 40px rgba(217, 197, 165, 0.03);
        }

        .product-card:active {
            transform: scale(0.98);
        }

        /* Cervezas destacadas */
        .product-card.cerveza-destacada {
            background: linear-gradient(145deg, #1a1a1a, #1f1a12);
            border-color: rgba(217, 197, 165, 0.2);
            box-shadow: 0 0 30px rgba(217, 197, 165, 0.04);
        }

        .product-card.cerveza-destacada::after {
            content: '🍺';
            position: absolute;
            right: 12px;
            top: 12px;
            font-size: 1.2rem;
            opacity: 0.15;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .product-card.cerveza-destacada .product-name {
            color: #D9C5A5;
        }

        .product-card.cerveza-destacada .badge-cerveza {
            background: rgba(217, 197, 165, 0.15);
            color: #D9C5A5;
            border: 1px solid rgba(217, 197, 165, 0.2);
            padding: 0.15rem 0.8rem;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-image {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            object-fit: cover;
            background: #1a1a1a;
            flex-shrink: 0;
            border: 2px solid rgba(217, 197, 165, 0.06);
            transition: all 0.4s ease;
        }

        .product-card:hover .product-image {
            border-color: rgba(217, 197, 165, 0.15);
            transform: scale(1.03);
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #f5f0eb;
            letter-spacing: -0.2px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem 0.6rem;
        }

        .product-name .badge {
            font-size: 0.55rem;
            font-weight: 700;
            background: rgba(217, 197, 165, 0.08);
            padding: 0.15rem 0.7rem;
            border-radius: 20px;
            color: #8a7a6a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(217, 197, 165, 0.06);
        }

        .product-desc {
            font-size: 0.82rem;
            color: #8a7a6a;
            margin-top: 0.15rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.3rem 0.6rem;
        }

        .product-desc .price {
            font-weight: 700;
            color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid rgba(76, 175, 80, 0.15);
        }

        .product-desc .tag {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #6a5a4a;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* Botón "Me gusta" */
        .like-btn {
            background: transparent;
            border: none;
            color: #4a3a2a;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0.3rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
        }

        .like-btn:hover {
            color: #D9C5A5;
            transform: scale(1.2);
            background: rgba(217, 197, 165, 0.06);
        }

        .like-btn.liked {
            color: #4CAF50;
            animation: heartPop 0.4s ease;
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1); }
        }

        .cerveza-badge {
            background: rgba(217, 197, 165, 0.12);
            padding: 0.05rem 0.4rem;
            border-radius: 10px;
            font-size: 0.5rem;
            color: #D9C5A5;
            margin-left: 2px;
        }

        .empty-message {
            text-align: center;
            padding: 3rem 1rem;
            color: #4a3a2a;
            font-style: italic;
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            border: 1px dashed rgba(217, 197, 165, 0.06);
        }

        .footer-note {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #2a221a;
            border-top: 1px solid rgba(217, 197, 165, 0.04);
            padding-top: 1.5rem;
            letter-spacing: 1px;
        }

        .footer-note i {
            color: #D9C5A5;
            opacity: 0.2;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #D9C5A5;
            border-radius: 10px;
        }

        @media (max-width: 420px) {
            .product-card {
                padding: 0.8rem 0.8rem;
                gap: 0.8rem;
            }
            .product-image {
                width: 60px;
                height: 60px;
                border-radius: 14px;
            }
            .product-name {
                font-size: 0.95rem;
            }
            .category-tabs button {
                font-size: 0.7rem;
                padding: 0.4rem 1rem;
            }
            .header .logo-icon {
                font-size: 2.2rem;
            }
        }

        .product-card {
            opacity: 0;
            animation: cardSlideIn 0.5s ease forwards;
        }

        .product-card:nth-child(1) { animation-delay: 0.05s; }
        .product-card:nth-child(2) { animation-delay: 0.1s; }
        .product-card:nth-child(3) { animation-delay: 0.15s; }
        .product-card:nth-child(4) { animation-delay: 0.2s; }
        .product-card:nth-child(5) { animation-delay: 0.25s; }
        .product-card:nth-child(6) { animation-delay: 0.3s; }
        .product-card:nth-child(7) { animation-delay: 0.35s; }
        .product-card:nth-child(8) { animation-delay: 0.4s; }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Tooltip al hacer clic en "Me gusta" */
        .toast-message {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(217, 197, 165, 0.15);
            backdrop-filter: blur(12px);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #D9C5A5;
            border: 1px solid rgba(217, 197, 165, 0.1);
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 100;
        }

        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo-icon">🍻</span>
        <div class="subtitle">
            <i class="fas fa-wine-bottle"></i> carta digital
        </div>
    </div>

    <div class="category-indicator">
        <i class="fas fa-chevron-circle-right" style="color:#D9C5A5;font-size:0.6rem;"></i> elegí tu categoría <i class="fas fa-chevron-circle-left" style="color:#D9C5A5;font-size:0.6rem;"></i>
    </div>

    <div class="category-tabs" id="categoryTabs">
        <button class="active" data-category="bebidas"><i class="fas fa-wine-glass-alt"></i> Bebidas</button>
        <button data-category="cervezas"><i class="fas fa-beer"></i> Artesanales <span class="cerveza-badge">★</span></button>
        <button data-category="comidas"><i class="fas fa-utensils"></i> Comidas</button>
        <button data-category="papas"><i class="fas fa-french-fries"></i> Papas</button>
        <button data-category="pizzas"><i class="fas fa-pizza-slice"></i> Pizzas</button>
    </div>

    <div class="product-counter" id="productCounter">
        <span id="countDisplay">0</span> productos disponibles
    </div>

    <div id="productContainer" class="product-grid"></div>

    <div class="footer-note">
        <i class="fas fa-circle"></i>  <i class="fas fa-circle"></i>  <i class="fas fa-circle"></i>
    </div>

    <div class="toast-message" id="toastMessage">❤️ ¡Agregado a favoritos!</div>

    <script>
        (function() {
            const productos = [
                { id: 1, nombre: "Refresco de cola", descripcion: "Con hielo y lima", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🥤", precio: "$1.800", categoria: "bebidas" },
                { id: 2, nombre: "Naranja natural", descripcion: "Recién exprimida", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍊", precio: "$2.200", categoria: "bebidas" },
                { id: 3, nombre: "Limonada de menta", descripcion: "Refrescante y herbal", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍋", precio: "$2.000", categoria: "bebidas" },
                { id: 4, nombre: "Agua con gas", descripcion: "500 ml · burbujas", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=💧", precio: "$1.200", categoria: "bebidas" },
                { id: 5, nombre: "IPA del Norte", descripcion: "Lúpulo intenso · 6.2%", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍺", precio: "$3.500", categoria: "cervezas", destacada: true },
                { id: 6, nombre: "Pale Ale tostada", descripcion: "Notas a caramelo", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍺", precio: "$3.200", categoria: "cervezas", destacada: true },
                { id: 7, nombre: "Stout ahumada", descripcion: "Cuerpo oscuro · 5.8%", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍺", precio: "$3.800", categoria: "cervezas", destacada: true },
                { id: 8, nombre: "Lager fresca", descripcion: "Crisp · 4.5%", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍺", precio: "$2.900", categoria: "cervezas", destacada: true },
                { id: 9, nombre: "Hamburguesa clásica", descripcion: "200g · queso cheddar", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍔", precio: "$7.500", categoria: "comidas" },
                { id: 10, nombre: "Taco de carnitas", descripcion: "Tres piezas · salsa verde", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🌮", precio: "$6.900", categoria: "comidas" },
                { id: 11, nombre: "Ensalada César", descripcion: "Pollo · parmesano", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🥗", precio: "$5.800", categoria: "comidas" },
                { id: 12, nombre: "Croquetas de jamón", descripcion: "6 uds · bechamel", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🧆", precio: "$4.900", categoria: "comidas" },
                { id: 13, nombre: "Papas fritas clásicas", descripcion: "Sal marina · crujientes", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍟", precio: "$2.900", categoria: "papas" },
                { id: 14, nombre: "Papas bravas", descripcion: "Salsa brava · alioli", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🌶️", precio: "$3.500", categoria: "papas" },
                { id: 15, nombre: "Papas con queso", descripcion: "Cheddar fundido y bacon", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🧀", precio: "$4.200", categoria: "papas" },
                { id: 16, nombre: "Aros de cebolla", descripcion: "Con salsa barbacoa", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🧅", precio: "$3.800", categoria: "papas" },
                { id: 17, nombre: "Margarita", descripcion: "Tomate · mozzarella · albahaca", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍕", precio: "$6.500", categoria: "pizzas" },
                { id: 18, nombre: "Pepperoni", descripcion: "Doble pepperoni · orégano", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍕", precio: "$7.800", categoria: "pizzas" },
                { id: 19, nombre: "Cuatro quesos", descripcion: "Mozzarella · gorgonzola · parmesano · provolone", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🧀", precio: "$8.500", categoria: "pizzas" },
                { id: 20, nombre: "Vegetariana", descripcion: "Pimientos · champiñones · aceitunas", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍕", precio: "$7.200", categoria: "pizzas" },
                { id: 21, nombre: "Barbacoa", descripcion: "Pollo · cebolla · salsa barbacoa", imagen: "https://placehold.co/200x200/1a1a1a/D9C5A5?text=🍕", precio: "$8.200", categoria: "pizzas" },
            ];

            const container = document.getElementById('productContainer');
            const tabs = document.querySelectorAll('.category-tabs button');
            const countDisplay = document.getElementById('countDisplay');
            const toast = document.getElementById('toastMessage');
            let likedState = {};
            let toastTimeout;

            function showToast(message) {
                toast.textContent = message || '❤️ ¡Agregado a favoritos!';
                toast.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            function renderProductos(categoriaFiltro) {
                let productosFiltrados = productos.filter(p => p.categoria === categoriaFiltro);

                if (productosFiltrados.length === 0) {
                    container.innerHTML = `<div class="empty-message">🍃 No hay productos en esta categoría</div>`;
                    countDisplay.textContent = '0';
                    return;
                }

                countDisplay.textContent = productosFiltrados.length;

                let html = '';
                productosFiltrados.forEach((p, index) => {
                    const isLiked = likedState[p.id] || false;
                    const isCerveza = p.categoria === 'cervezas';
                    const destacadaClass = isCerveza ? 'cerveza-destacada' : '';

                    let badge = '';
                    if (isCerveza) {
                        badge = `<span class="badge-cerveza"><i class="fas fa-star" style="font-size:0.5rem;"></i> artesanal</span>`;
                    } else if (p.categoria === 'papas' && p.nombre.includes('bravas')) {
                        badge = `<span class="badge">🌶️ brava</span>`;
                    }

                    const descripcionParts = p.descripcion ? p.descripcion.split('·') : [''];
                    const descripcionClean = descripcionParts[0].trim();
                    const extraTags = descripcionParts.slice(1).map(t => t.trim()).filter(t => t.length > 0);

                    html += `
                        <div class="product-card ${destacadaClass}" data-id="${p.id}">
                            <img class="product-image" src="${p.imagen}" alt="${p.nombre}" loading="lazy">
                            <div class="product-info">
                                <div class="product-name">
                                    ${p.nombre}
                                    ${badge}
                                </div>
                                <div class="product-desc">
                                    <span>${descripcionClean}</span>
                                    ${extraTags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                    <span class="price">${p.precio}</span>
                                </div>
                            </div>
                            <button class="like-btn ${isLiked ? 'liked' : ''}" data-id="${p.id}" aria-label="Me gusta">
                                <i class="fas fa-heart"></i>
                            </button>
                        </div>
                    `;
                });

                container.innerHTML = html;

                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        const isLiked = likedState[id] || false;
                        likedState[id] = !isLiked;
                        this.classList.toggle('liked');
                        if (navigator.vibrate) navigator.vibrate(15);
                        showToast(isLiked ? '💔 Eliminado de favoritos' : '❤️ ¡Agregado a favoritos!');
                    });
                });
            }

            function setActiveCategory(categoria) {
                tabs.forEach(btn => {
                    const cat = btn.getAttribute('data-category');
                    if (cat === categoria) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                renderProductos(categoria);
                container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            tabs.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const categoria = this.getAttribute('data-category');
                    setActiveCategory(categoria);
                });
            });

            const activeTab = document.querySelector('.category-tabs .active');
            const initialCategory = activeTab ? activeTab.getAttribute('data-category') : 'bebidas';
            setActiveCategory(initialCategory);
        })();
    </script>
</body>
</html>
